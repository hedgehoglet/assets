  <div id="page-wrap">
    <main>

    <section class="hero" aria-label="Search assets">
      <img src="assets/logo.png" alt="Hedgehoglet logo" class="hero-logo" width="72" height="72">
      <h1><span class="accent">Forage</span></h1>
      <p class="hero-sub">Open assets for research and prototyping.</p>

      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input
          id="search"
          class="search-input"
          type="search"
          placeholder="Search by name, tag, or keyword…"
          aria-label="Search assets"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <div class="filters-wrap" role="group" aria-label="Filter by format" id="filters">
        <!-- Pills injected by JS -->
      </div>
    </section>

    <div class="content">
      <div class="section-header reveal">
        <h2 class="section-label">Assets</h2>
        <span class="result-count" id="result-count" aria-live="polite"></span>
        <div class="section-line" aria-hidden="true"></div>
      </div>

      <ul class="asset-grid" role="list" id="cards">
        <li class="empty-state"><p>Loading…</p></li>
      </ul>
    </div>

    </main>

    <footer class="site-footer">
      <p>© 2026 <a href="https://hedgehoglet.dev/">Hedgehoglet</a></p>
    </footer>
  </div>

  <script>
    const REGISTRY = 'assets/registry.json';

    const arrowSvg = `<svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M7 17L17 7M7 7h10v10"/></svg>`;

    const badgeClass = f => ({ json:'badge-json', csv:'badge-csv', yaml:'badge-yaml', xml:'badge-xml', txt:'badge-txt' })[f.toLowerCase()] ?? 'badge-other';
    const delayClass = i => ['', 'reveal-delay-1', 'reveal-delay-2', 'reveal-delay-3'][Math.min(i, 3)];
    const fmt = d => { const [y, m] = d.split('-'); return new Date(y, m - 1).toLocaleDateString('en', { year:'numeric', month:'short' }); };
    const escape = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    let assets = [];
    let activeFormat = 'all';
    let activeTag = '';
    let searchQuery = '';

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });

    function buildFilters() {
      const counts = {};
      assets.forEach(a => {
        const f = a.format.toLowerCase();
        counts[f] = (counts[f] ?? 0) + 1;
      });

      const formats = ['all', ...Object.keys(counts)];
      const el = document.getElementById('filters');
      el.innerHTML = '';

      formats.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'filter-pill' + (f === 'all' ? ' active' : '');
        btn.dataset.format = f;
        const label = f === 'all' ? 'All' : f.toUpperCase();
        const count = f === 'all' ? assets.length : counts[f];
        btn.innerHTML = `${label} <span class="pill-count">${count}</span>`;
        btn.addEventListener('click', () => {
          activeFormat = f;
          activeTag = '';
          el.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.format === f));
          render();
        });
        el.appendChild(btn);
      });
    }

    function render() {
      const list = document.getElementById('cards');
      const countEl = document.getElementById('result-count');

      const filtered = assets.filter(a => {
        const tags = a.tags ?? [];
        const matchFormat = activeFormat === 'all' || a.format.toLowerCase() === activeFormat;
        const matchTag = !activeTag || tags.includes(activeTag);
        const q = searchQuery;
        const matchSearch = !q ||
          a.file.toLowerCase().includes(q) ||
          a.description.toLowerCase().includes(q) ||
          tags.some(t => t.toLowerCase().includes(q));
        return matchFormat && matchTag && matchSearch;
      });

      countEl.textContent = filtered.length === assets.length
        ? `${assets.length} asset${assets.length !== 1 ? 's' : ''}`
        : `${filtered.length} of ${assets.length}`;

      list.innerHTML = '';

      if (filtered.length === 0) {
        const term = escape(activeTag || searchQuery);
        list.insertAdjacentHTML('beforeend', `
          <li class="empty-state">
            <p>No assets match <strong>"${term}"</strong>.</p>
            <p>Try a different keyword or filter.</p>
          </li>
        `);
        return;
      }

      filtered.forEach((a, i) => {
        const tags = a.tags ?? [];
        const tagPills = tags.map(t => `
          <button class="tag-pill${t === activeTag ? ' active' : ''}" data-tag="${t}">${t}</button>
        `).join('');

        list.insertAdjacentHTML('beforeend', `
          <li>
            <a href="${a.path}" target="_blank" rel="noopener noreferrer" class="asset-card reveal ${delayClass(i)}">
              <span class="card-icon" aria-hidden="true">${a.icon ?? '📄'}</span>
              <h3>${a.file}</h3>
              <p>${a.description}</p>
              ${tags.length ? `<div class="card-tags">${tagPills}</div>` : ''}
              <div class="card-footer">
                <span class="badge ${badgeClass(a.format)}">${a.format.toUpperCase()}</span>
                ${a.size ? `<span class="card-meta">${a.size}</span>` : ''}
                ${a.added ? `<span class="card-meta">${fmt(a.added)}</span>` : ''}
                ${arrowSvg}
              </div>
            </a>
          </li>
        `);
      });

      // Tag pill clicks: stop propagation so the card link does not fire
      list.querySelectorAll('.tag-pill').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
          const t = btn.dataset.tag;
          activeTag = activeTag === t ? '' : t;
          render();
        });
      });

      document.querySelectorAll('#cards .reveal:not(.visible)').forEach(el => observer.observe(el));
    }

    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase().trim();
      activeTag = '';
      render();
    });

    function load() {
      document.getElementById('cards').innerHTML = `<li class="empty-state"><p>Loading…</p></li>`;
      fetch(REGISTRY)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
          assets = data;
          buildFilters();
          render();
        })
        .catch(() => {
          document.getElementById('cards').innerHTML = `
            <li class="empty-state">
              <p>Could not load the asset registry.</p>
              <p><button class="tag-pill" onclick="load()">Try again</button></p>
            </li>
          `;
        });
    }

    load();
  </script>

</body>
